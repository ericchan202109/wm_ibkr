summary: Strategy runner for the daily and weekly LLM-integrated IBKR signal
description: Runs the first pluggable strategy implementation using daily and
  weekly reports, S3 chart artifacts, and an LLM-generated consolidated trading
  signal.
value:
  modules:
    - id: daily_report
      value:
        path: u/admin2/run_stock_report
        type: script
        is_trigger: false
        input_transforms:
          host:
            expr: flow_input.host
            type: javascript
          port:
            expr: flow_input.port
            type: javascript
          symbol:
            expr: flow_input.symbol
            type: javascript
          persist:
            expr: flow_input.persist_reports
            type: javascript
          run_new:
            expr: flow_input.data_mode === "run_new"
            type: javascript
          use_rth:
            expr: flow_input.use_rth
            type: javascript
          bar_size:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily.bar_size)
              || "1 day")
            type: javascript
          currency:
            expr: flow_input.currency
            type: javascript
          exchange:
            expr: flow_input.exchange
            type: javascript
          client_id:
            expr: flow_input.client_id
            type: javascript
          load_latest:
            expr: flow_input.data_mode !== "run_new"
            type: javascript
          lookback_days:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily.lookback_days)
              || 365)
            type: javascript
          db_resource_path:
            expr: flow_input.db_resource_path
            type: javascript
      summary: Generate the daily stock report context
    - id: weekly_report
      value:
        path: u/admin2/run_stock_report
        type: script
        is_trigger: false
        input_transforms:
          host:
            expr: flow_input.host
            type: javascript
          port:
            expr: flow_input.port
            type: javascript
          symbol:
            expr: flow_input.symbol
            type: javascript
          persist:
            expr: flow_input.persist_reports
            type: javascript
          run_new:
            expr: flow_input.data_mode === "run_new"
            type: javascript
          use_rth:
            expr: flow_input.use_rth
            type: javascript
          bar_size:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly.bar_size)
              || "1 week")
            type: javascript
          currency:
            expr: flow_input.currency
            type: javascript
          exchange:
            expr: flow_input.exchange
            type: javascript
          client_id:
            expr: flow_input.client_id
            type: javascript
          load_latest:
            expr: flow_input.data_mode !== "run_new"
            type: javascript
          lookback_days:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly.lookback_days)
              || 730)
            type: javascript
          db_resource_path:
            expr: flow_input.db_resource_path
            type: javascript
      summary: Generate the weekly stock report context
    - id: daily_chart
      value:
        path: u/admin2/generate_signal_chart
        type: script
        is_trigger: false
        input_transforms:
          host:
            expr: flow_input.host
            type: javascript
          port:
            expr: flow_input.port
            type: javascript
          symbol:
            expr: flow_input.symbol
            type: javascript
          use_rth:
            expr: flow_input.use_rth
            type: javascript
          bar_size:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily.bar_size)
              || "1 day")
            type: javascript
          currency:
            expr: flow_input.currency
            type: javascript
          exchange:
            expr: flow_input.exchange
            type: javascript
          client_id:
            expr: flow_input.client_id
            type: javascript
          lookback_days:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily.lookback_days)
              || 365)
            type: javascript
          fallback_latest:
            expr: (results.daily_report.report && results.daily_report.report.latest) ||
              results.daily_report.latest || null
            type: javascript
          timeframe_label:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.daily.label)
              || "daily")
            type: javascript
          s3_resource_path:
            expr: flow_input.s3_resource_path
            type: javascript
      summary: Generate the daily chart artifact and upload it to S3
    - id: weekly_chart
      value:
        path: u/admin2/generate_signal_chart
        type: script
        is_trigger: false
        input_transforms:
          host:
            expr: flow_input.host
            type: javascript
          port:
            expr: flow_input.port
            type: javascript
          symbol:
            expr: flow_input.symbol
            type: javascript
          use_rth:
            expr: flow_input.use_rth
            type: javascript
          bar_size:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly.bar_size)
              || "1 week")
            type: javascript
          currency:
            expr: flow_input.currency
            type: javascript
          exchange:
            expr: flow_input.exchange
            type: javascript
          client_id:
            expr: flow_input.client_id
            type: javascript
          lookback_days:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly.lookback_days)
              || 730)
            type: javascript
          fallback_latest:
            expr: (results.weekly_report.report && results.weekly_report.report.latest) ||
              results.weekly_report.latest || null
            type: javascript
          timeframe_label:
            expr: >-
              ((flow_input.strategy_definition &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json) &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly &&
              (flow_input.strategy_definition.effective_params ||
              flow_input.strategy_definition.param_json).timeframes.weekly.label)
              || "weekly")
            type: javascript
          s3_resource_path:
            expr: flow_input.s3_resource_path
            type: javascript
      summary: Generate the weekly chart artifact and upload it to S3
    - id: integrated_signal
      value:
        path: u/admin2/generate_integrated_ibkr_signal
        type: script
        is_trigger: false
        input_transforms:
          symbol:
            expr: flow_input.symbol
            type: javascript
          daily_chart:
            expr: results.daily_chart
            type: javascript
          daily_report:
            expr: results.daily_report
            type: javascript
          strategy_key:
            expr: >-
              ((flow_input.strategy_definition &&
              flow_input.strategy_definition.strategy_key) ||
              "daily_weekly_llm")
            type: javascript
          weekly_chart:
            expr: results.weekly_chart
            type: javascript
          strategy_name:
            expr: >-
              ((flow_input.strategy_definition && flow_input.strategy_definition.name)
              || "Daily + Weekly Integrated LLM")
            type: javascript
          symbol_config:
            expr: flow_input.symbol_config
            type: javascript
          weekly_report:
            expr: results.weekly_report
            type: javascript
          workflow_config:
            expr: flow_input.workflow_config
            type: javascript
          strategy_context:
            expr: flow_input.strategy_definition || {}
            type: javascript
          llm_resource_path:
            expr: flow_input.llm_resource_path
            type: javascript
      summary: Use the LLM to consolidate daily and weekly context into one IBKR
        trading signal
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    symbol:
      type: string
      description: Stock ticker symbol
    strategy_definition:
      type: object
      description: Strategy registry row with effective params and risk config
    workflow_config:
      type: object
      description: Global workflow configuration from PostgreSQL
    symbol_config:
      type: object
      description: Symbol-level overrides from PostgreSQL
    host:
      type: string
      default: host.docker.internal
      description: IBKR gateway host
    port:
      type: integer
      default: 4002
      description: IBKR gateway port
    client_id:
      type: integer
      default: 7
      description: IBKR client id
    exchange:
      type: string
      default: NASDAQ
      description: Market exchange for report generation
    currency:
      type: string
      default: USD
      description: Contract currency
    use_rth:
      type: boolean
      default: true
      description: Use regular trading hours
    db_resource_path:
      type: string
      default: u/admin2/supabase_postgresql
      description: PostgreSQL resource path
    s3_resource_path:
      type: string
      default: u/admin2/minio_s3
      description: MinIO or S3 resource path used for chart artifacts
    llm_resource_path:
      type: string
      default: u/admin2/capi_customai
      description: LLM resource path
    data_mode:
      type: string
      default: run_new
      description: run_new or load_latest
    persist_reports:
      type: boolean
      default: false
      description: Persist run_stock_report output
  required:
    - symbol
    - workflow_config
